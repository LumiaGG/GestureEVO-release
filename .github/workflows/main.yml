name: Publish APK Release

on:
  push:
    branches:
      - main
    paths:
      - "*.apk"
      - "*.APK"
      - "release-notes.md"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate APK and release notes
        id: release-meta
        shell: bash
        run: |
          set -euo pipefail

          NOTES_FILE="release-notes.md"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "Missing or empty $NOTES_FILE"
            exit 1
          fi

          APK_PATH="$(find . -maxdepth 1 -type f -iname '*.apk' | sed 's|^\./||' | sort -V | tail -n 1)"

          if [ -z "$APK_PATH" ]; then
            echo "No APK file found in repository root"
            exit 1
          fi

          APK_FILENAME="$(basename "$APK_PATH")"
          APK_STEM="${APK_FILENAME%.*}"

          if [[ "$APK_STEM" =~ ^GestureEVO-(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION="$APK_STEM"
          fi

          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_filename=$APK_FILENAME" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release-meta.outputs.version }}
          name: GestureEVO v${{ steps.release-meta.outputs.version }}
          body_path: ${{ steps.release-meta.outputs.notes_file }}
          files: ${{ steps.release-meta.outputs.apk_path }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
